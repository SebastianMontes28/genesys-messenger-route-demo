name: genesys-messenger-route-demo

services:
  # 1. Maqueta Web Estática (Servidor Nginx interno)
  genesys-messenger-route-demo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: genesys-messenger-route-demo
    restart: unless-stopped
    expose:
      - "80"
    mem_limit: 128m
    cpus: "0.25"

  # 2. Proxy Inverso con SSL Automático (Caddy)
  caddy:
    image: caddy:alpine
    container_name: caddy-ssl-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    # IMPORTANTE: Configuramos servidores DNS públicos en el contenedor.
    # Esto evita el error de resolución ("connection refused" en 127.0.0.53)
    # causado por el resolvedor local systemd-resolved de Ubuntu.
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - genesys-messenger-route-demo

volumes:
  caddy_data:
  caddy_config:
