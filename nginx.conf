server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Route root page
  location = / {
    try_files /index.html =404;
  }

  # Route clean paths to their respective files
  location = /nosotros {
    try_files /nosotros.html =404;
  }

  location = /contacto {
    try_files /contacto.html =404;
  }

  # Route static directories directly
  location /css/ {
    try_files $uri =404;
  }

  location /js/ {
    try_files $uri =404;
  }

  # General fallback
  location / {
    try_files $uri $uri.html /index.html;
  }
}
